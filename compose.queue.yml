services:
    redis:
        container_name: queue
        image: redis:8-alpine
        networks: [saturn-net]
        # AOF so the BullMQ queue survives a restart. Bound to localhost only —
        # reachable by the api/worker over the compose network as redis:6379.
        command: redis-server --appendonly yes
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - redis:/data

networks:
    saturn-net:
        external: true
  
volumes:
  redis:
