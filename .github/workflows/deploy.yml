name: Build and deploy API to VPS
on:
    push:
        branches: [main]
    workflow_dispatch:
        inputs:
            run_migrations:
                description: "Force prisma migrate deploy (bootstrap / manual re-run)"
                type: boolean
                default: false

permissions:
    packages: write
    contents: read

concurrency:
    group: deploy-api
    cancel-in-progress: false
jobs:
    deploy:
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # Decide whether to run Prisma migrations
            # Migrations run only when prisma/migrations/** changes (push) or when
            # triggered manually with run_migrations=true (bootstrap / re-run).
            - name: Detect migration changes
              id: changes
              if: github.event_name == 'push'
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      migrations:
                        - 'prisma/migrations/**'

            - name: Decide whether to run migrations
              id: migr
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_migrations }}" = "true" ]; then
                    echo "run=true" >> "$GITHUB_OUTPUT"
                  elif [ "${{ steps.changes.outputs.migrations }}" = "true" ]; then
                    echo "run=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "run=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push image (arm64)
              env:
                  IMAGE: ghcr.io/vitozaap/saturn-api
              run: |
                  docker build -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" .
                  docker push "$IMAGE:latest"
                  docker push "$IMAGE:${{ github.sha }}"
            - name: Run prisma migrations
              if: steps.migr.outputs.run == 'true'
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
              # installs dependencies
              run: |
                  npm install --no-save prisma@7.8.0 dotenv 
                  npx prisma migrate deploy
            - name: Copy compose file into VPS over SSH
              uses: appleboy/scp-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  source: compose.prod.yml
                  target: ~/saturn-api

            - name: Copy queue compose file into VPS over SSH
              uses: appleboy/scp-action@v1
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  source: compose.queue.yml
                  target: ~/saturn-queue

            - name: Deploy over SSH
              uses: appleboy/ssh-action@v1
              env:
                  PROD_ENV: ${{ secrets.PROD_ENV }}
                  GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  host: ${{secrets.VPS_HOST}}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  envs: PROD_ENV,GHCR_TOKEN
                  script: |
                      echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
                      docker network inspect saturn-net >/dev/null 2>&1 || docker network create saturn-net
                      cd ~/saturn-queue
                      docker compose -f compose.queue.yml up -d
                      cd ~/saturn-api
                      printf '%s' "$PROD_ENV" > .env
                      chmod 600 .env
                      docker compose -f compose.prod.yml pull
                      docker compose -f compose.prod.yml up -d
                      docker image prune -f
                      docker logout ghcr.io
