name: Code Quality & Testing

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'     

      - name: Install dependencies
        run: npm ci        

      - name: Run Vitest tests
        run: npm run test