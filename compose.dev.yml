services:
  db:
    container_name: db
    image: postgres:18.4-alpine
    networks: [saturn-net]
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres:/var/lib/postgresql

  minio:
    container_name: bucket
    image: quay.io/minio/minio:latest
    networks: [saturn-net]
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env.local
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio:/data
  
  createbucket:
    image: quay.io/minio/mc:latest
    networks: [saturn-net]
    container_name: minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      # Bootstrap with root, then mint a least-privilege key for the API so a
      # leaked presigned URL can't inherit admin. Idempotent: safe to re-run.
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing local/${BUCKET}
        cat > /tmp/squish-rw.json <<'EOF'
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
              "Resource": ["arn:aws:s3:::${BUCKET}/*"]
            }
          ]
        }
        EOF
        mc admin policy create local squish-rw /tmp/squish-rw.json || true
        mc admin user add local "${MINIO_USER}" "${MINIO_PASSWORD}" || true
        mc admin policy attach local squish-rw --user "${MINIO_USER}" || true
        exit 0

  # BullMQ queue (API producer + worker consumer). AOF so jobs survive a restart.
  redis-queue:
    container_name: redis-queue
    networks: [saturn-net]
    image: redis:8-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis-queue:/data

  # Status pub/sub (worker publishes, API relays over SSE). Ephemeral —
  # pub/sub messages are fire-and-forget, so no persistence needed.
  redis-status:
    container_name: redis-status
    networks: [saturn-net]
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6380:6379"

  app:
    container_name: api
    networks: [saturn-net]
    build:
      context: .
      dockerfile: Dockerfile.dev
    # .env.local sets PORT=3001 (web dev server owns 3000)
    ports:
      - "3001:3001"
    env_file:
      - .env.local
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-status:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully

volumes:
  postgres:
  minio:
  redis-queue:

networks:
    saturn-net:
        external: true