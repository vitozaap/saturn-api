services:
    minio:
        container_name: bucket
        image: quay.io/minio/minio:latest
        command: server /data --console-address ":9001"
        restart: always
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5
        environment:
            MINIO_ROOT_USER: ${MINIO_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
            MINIO_API_CORS_ALLOW_ORIGIN: ${WEB_URL}
        ports:
            - "127.0.0.1:9000:9000"
            - "127.0.0.1:9001:9001"
        volumes:
            - minio:/data
    createbucket:
        image: quay.io/minio/mc:latest
        container_name: minio-client
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 ${MINIO_USER} ${MINIO_PASSWORD};
            mc mb --ignore-existing local/${BUCKET};
            mc ilm rule add local/${BUCKET} --expire-days 1 --prefix ${UPLOADS_PATH}/ || true;
            exit 0;
            "
    redis:
        container_name: queue
        image: redis:8-alpine
        # AOF so the BullMQ queue survives a restart. Bound to localhost only —
        # reachable by the api/worker over the compose network as redis:6379.
        command: redis-server --appendonly yes
        restart: always
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
            - "127.0.0.1:6379:6379"
        volumes:
            - redis:/data
    api:
        image: ghcr.io/vitozaap/saturn-api:latest
        restart: always
        env_file:
            - .env
        ports:
            - "127.0.0.1:3000:3000"
        depends_on:
            minio:
                condition: service_healthy
            redis:
                condition: service_healthy

volumes:
    minio:
    redis:
