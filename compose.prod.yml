services:
    minio:
        container_name: bucket
        image: quay.io/minio/minio:latest
        networks: [saturn-net]
        command: server /data --console-address ":9001"
        restart: always
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
            MINIO_API_CORS_ALLOW_ORIGIN: ${WEB_URL}
        ports:
            - "127.0.0.1:9000:9000"
            - "127.0.0.1:9001:9001"
        volumes:
            - minio:/data
    createbucket:
        image: quay.io/minio/mc:latest
        container_name: minio-client
        depends_on:
            minio:
                condition: service_healthy
        entrypoint:
            - /bin/sh
            - -c
            # Bootstrap with root, then mint a least-privilege key for the API so a
            # leaked presigned URL can't inherit admin. Idempotent: safe to re-run.
            - |
                mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
                mc mb --ignore-existing local/${BUCKET}
                mc ilm rule add local/${BUCKET} --expire-days 1 --prefix ${UPLOADS_PATH}/ || true
                cat > /tmp/squish-rw.json <<'EOF'
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"],
                      "Resource": ["arn:aws:s3:::${BUCKET}/*"]
                    }
                  ]
                }
                EOF
                mc admin policy create local squish-rw /tmp/squish-rw.json || true
                mc admin user add local "${MINIO_USER}" "${MINIO_PASSWORD}" || true
                mc admin policy attach local squish-rw --user "${MINIO_USER}" || true
                exit 0
    api:
        image: ghcr.io/vitozaap/saturn-api:latest
        networks: [saturn-net]
        restart: always
        env_file:
            - .env
        ports:
            - "127.0.0.1:3000:3000"
        depends_on:
            minio:
                condition: service_healthy
            createbucket:
                condition: service_completed_successfully

networks:
    saturn-net:
        external: true

volumes:
    minio:
